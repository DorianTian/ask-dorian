<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Ask Dorian</title>
  <style>
    :root {
      --color-primary: #10b981;
      --color-primary-glow: rgba(16, 185, 129, 0.15);
      --color-bg: #09090b;
      --color-surface: #18181b;
      --color-border: #27272a;
      --color-text-main: #f8fafc;
      --color-text-muted: #94a3b8;
    }
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body {
      background-color: var(--color-bg);
      color: var(--color-text-main);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #root { display: flex; }

    /* Remove React Navigation card border/radius on web */
    #root [style*="border-radius"] { border-radius: 0 !important; }
    #root [style*="overflow: hidden"] { overflow: visible !important; }

    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: var(--color-border); border-radius: 9999px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="module" src="/src/index.web.tsx"></script>
</body>
</html>
